name: Deploy Supabase Function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: Edge Function to deploy
        required: true
        default: workflow-f-agent
        type: choice
        options:
          - workflow-f-agent
          - client-ai-onboarding

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: peenmmujciouzulfoykq
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.13.8

      - name: Verify CLI
        run: supabase --version

      - name: Deploy selected function
        working-directory: NexusQ
        run: >
          supabase functions deploy
          "${{ inputs.function_name }}"
          --use-api
          --project-ref "$PROJECT_ID"
          --no-verify-jwt
