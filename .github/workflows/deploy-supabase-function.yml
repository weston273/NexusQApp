name: Deploy Supabase Function

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-supabase-function.yml"
      - "NexusQ/supabase/functions/workflow-f-agent/**"
      - "NexusQ/supabase/functions/client-ai-onboarding/**"
      - "NexusQ/supabase/functions/_shared/**"
  workflow_dispatch:
    inputs:
      function_name:
        description: Edge Function to deploy
        required: true
        default: workflow-f-agent
        type: choice
        options:
          - workflow-f-agent
          - client-ai-onboarding

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: peenmmujciouzulfoykq
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.13.8

      - name: Verify CLI
        run: supabase --version

      - name: Ensure deploy secret exists
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured in GitHub Actions secrets."
            exit 1
          fi

      - name: Deploy Workflow F on push
        if: github.event_name == 'push'
        working-directory: NexusQ
        run: >
          supabase functions deploy
          workflow-f-agent
          --use-api
          --project-ref "$PROJECT_ID"
          --no-verify-jwt

      - name: Deploy selected function
        if: github.event_name == 'workflow_dispatch'
        working-directory: NexusQ
        run: >
          supabase functions deploy
          "${{ inputs.function_name }}"
          --use-api
          --project-ref "$PROJECT_ID"
          --no-verify-jwt
